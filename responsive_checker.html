<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Preview Tool | Muszyolo</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #0f172a;
            color: white;
            font-family: 'Ubuntu', sans-serif;
            display: flex;
            flex-direction: column;
            gap: 20px;
            height: 100vh;
        }
        .header {
            text-align: center;
        }
        .preview-container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
            flex-grow: 1;
        }
        .frame-wrapper {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .label {
            font-weight: bold;
            background: rgba(255,255,255,0.1);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            width: fit-content;
        }
        iframe {
            background: white;
            border: 4px solid #334155;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        /* Mobile View (iPhone 14 Pro size) */
        .mobile-frame {
            width: 393px;
            height: 852px;
        }
        /* Desktop View */
        .desktop-frame {
            width: 1000px;
            height: 852px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Responsive Preview: LRHub</h1>
        <p>Testing Mobile (393px) vs Desktop (1000px)</p>
    </div>

    <div class="preview-container">
        <!-- Mobile View -->
        <div class="frame-wrapper">
            <div class="label">📱 Mobile (iPhone 14 Pro)</div>
            <iframe src="index.html" class="mobile-frame"></iframe>
        </div>

        <!-- Desktop View -->
        <div class="frame-wrapper">
            <div class="label">💻 Desktop View</div>
            <iframe src="index.html" class="desktop-frame"></iframe>
        </div>
    </div>
</body>
</html>
